name: Deploy Flask App to Azure - singhisking

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies (for validation only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Verify project structure
        run: |
          echo "===== FILE STRUCTURE ====="
          ls -R
          echo "===== CHECK main.py ====="
          if [ -f "main.py" ]; then
            echo "main.py found ✅"
          else
            echo "main.py missing ❌"
            exit 1
          fi

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'singhisking'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
