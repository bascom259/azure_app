<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: #1e293b;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
        }

        .user {
            background: #3b82f6;
            align-self: flex-end;
        }

        .bot {
            background: #334155;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">🤖 AI Chatbot</div>

<div class="chat-box" id="chat"></div>

<div class="input-area">
    <input id="msg" placeholder="Type a message..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMessage(data.reply, "bot");
}

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
